services:
  - type: web
    name: magiko-tetradio-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # OPENAI_API_KEY must be set in the Render dashboard (per-deploy secret).
      - key: OPENAI_API_KEY
        sync: false
